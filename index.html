<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashi Jain | AI Researcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <nav>
        <div class="nav-content">
            <a href="#home" class="logo">RJ.</a>
            <div class="nav-links">
                <a href="#about">About</a>
                <a href="#skills">Skills</a>
                <a href="#experience">Experience</a>
                <a href="#projects">Projects</a>
            </div>
        </div>
    </nav>

    <div class="container" id="home">
        <header class="hero section-fade">
            <div class="profile-wrapper">
                <img src="profile.jpg" alt="Rashi Jain" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?name=Rashi+Jain&background=0D8ABC&color=fff&size=150'">
            </div>
            <h1>Hi, I'm <span class="gradient-text">Rashi Jain</span></h1>
            <div class="typing-container">
                <p class="subtitle">I build <span id="typewriter"></span></p>
            </div>
            <div class="social-links">
                <a href="mailto:rashijain013@gmail.com" title="Email"><i class="fas fa-envelope"></i></a>
                <a href="https://www.linkedin.com/in/rashijain013" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="https://github.com/rashijain" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
            </div>
        </header>

        <div id="about-container"></div>
        <div id="skills-container"></div>
        <div id="experience-container"></div>
        <div id="projects-container"></div>
    </div>

    <footer>
        <p>&copy; 2026 Rashi Jain. Designed for the Future.</p>
    </footer>

    <script>
        async function loadSection(id, file) {
            try {
                const response = await fetch(file);
                if (response.ok) {
                    const text = await response.text();
                    document.getElementById(id).innerHTML = text;
                }
            } catch (error) {
                console.error("Error loading component: ", file);
            }
        }

        async function buildPage() {
            // Wait for all sections to be fetched and injected
            await loadSection('about-container', 'about.html');
            await loadSection('skills-container', 'skills.html');
            await loadSection('experience-container', 'experience.html');
            await loadSection('projects-container', 'projects.html');
            
            // Inject the main script file ONLY AFTER HTML is loaded 
            // so the scroll animations know the elements exist
            const script = document.createElement('script');
            script.src = 'assets/js/script.js';
            document.body.appendChild(script);
        }
        
        buildPage();
    </script>
</body>
</html>
